services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      - mongo
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB_NAME: life_outcome_simulator
      JWT_SECRET: replace-this-secret
      JWT_EXPIRE_MINUTES: 1440
      USE_LSTM: "true"
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  mongo_data:
